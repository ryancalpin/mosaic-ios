name: Mosaic
options:
  bundleIdPrefix: com.ryncalpin
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: "0.12.1"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

targets:
  Mosaic:
    type: application
    platform: iOS
    sources:
      - Sources/Mosaic
    resources:
      - path: Resources
        optional: true
    info:
      path: Sources/Mosaic/App/Info.plist
      properties:
        CFBundleDisplayName: Mosaic
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSFaceIDUsageDescription: Used to protect saved server credentials
        UIAppFonts:
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Bold.ttf
          - JetBrainsMono-SemiBold.ttf
        NSUserActivityTypes:
          - com.mosaic.session
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.mosaic.renderer
            UTTypeDescription: Mosaic Renderer Definition
            UTTypeConformsTo:
              - public.data
              - public.json
            UTTypeTagSpecification:
              "public.filename-extension":
                - mosaic-renderer
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.mosaic.renderer
            UTTypeDescription: Mosaic Renderer Definition
            UTTypeConformsTo:
              - public.data
              - public.json
            UTTypeTagSpecification:
              "public.filename-extension":
                - mosaic-renderer
    entitlements:
      path: Sources/Mosaic/App/Mosaic.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.ryncalpin.mosaic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryncalpin.mosaic
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        OTHER_LDFLAGS: "-lz"
    dependencies:
      - package: Citadel
      - package: SwiftTerm
      - framework: Frameworks/mosh.xcframework
        embed: true
      - framework: Frameworks/Protobuf_C_.xcframework
        embed: true
      - sdk: AppIntents.framework

  MosaicTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/MosaicTests
    dependencies:
      - target: Mosaic
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ryncalpin.mosaic.tests
